spring.application.name=hms-backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/hms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:hms_user}
spring.datasource.password=${DATABASE_PASSWORD:hms_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2s

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
# Redis is provisioned for future session/rate-limit use; disable health until code depends on it.
management.health.redis.enabled=false
management.health.mail.enabled=false

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# JWT (access: 15m, refresh: 7d per SECURITY.md). Override secrets via environment variables.
# Set JWT_ALLOW_INSECURE_SECRETS=false in staging/production so placeholder secrets fail startup.
hms.security.jwt.access-token-secret=${JWT_SECRET:change-me-access-token-secret-key-min-32-chars!!}
hms.security.jwt.refresh-token-secret=${JWT_REFRESH_SECRET:change-me-refresh-token-secret-key-min-32-chars!}
hms.security.jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:15m}
hms.security.jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:7d}
hms.security.jwt.issuer=${JWT_ISSUER:healthcare-hms}
hms.security.jwt.allow-insecure-secrets=${JWT_ALLOW_INSECURE_SECRETS:true}

# Password recovery (token TTL + frontend reset-link base URL)
hms.security.password-reset.token-expiration=${PASSWORD_RESET_EXPIRATION:1h}
hms.security.password-reset.frontend-base-url=${FRONTEND_URL:http://localhost:3000}

# Email verification (token TTL + frontend verify-link base URL)
hms.security.email-verification.token-expiration=${EMAIL_VERIFICATION_EXPIRATION:24h}
hms.security.email-verification.frontend-base-url=${FRONTEND_URL:http://localhost:3000}

# Email delivery — disabled by default (logs reset/verification links). Enable with MAIL_ENABLED=true + SMTP_*.
hms.mail.enabled=${MAIL_ENABLED:false}
hms.mail.from=${MAIL_FROM:noreply@healthcare-hms.local}
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS — trusted frontend origins only (comma-separated list supported)
hms.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost}
hms.security.cors.allow-credentials=true
hms.security.cors.max-age-seconds=3600

# Tenant resolution — header (X-Tenant-ID) is primary; subdomain mapping reserved for later.
hms.tenant.resolution.subdomain-enabled=${TENANT_SUBDOMAIN_RESOLUTION_ENABLED:false}

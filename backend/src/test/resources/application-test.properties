spring.application.name=hms-backend-test

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Auth tests do not require Redis; disable health and autoconfig side-effects.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
management.health.redis.enabled=false
management.health.mail.enabled=false

hms.security.jwt.access-token-secret=test-access-token-secret-key-min-32-chars!!
hms.security.jwt.refresh-token-secret=test-refresh-token-secret-key-min-32-chars!
hms.security.jwt.access-token-expiration=15m
hms.security.jwt.refresh-token-expiration=7d
hms.security.jwt.issuer=healthcare-hms-test
hms.security.jwt.allow-insecure-secrets=true

hms.security.password-reset.token-expiration=1h
hms.security.password-reset.frontend-base-url=http://localhost:3000

hms.security.email-verification.token-expiration=24h
hms.security.email-verification.frontend-base-url=http://localhost:3000

hms.mail.enabled=false
hms.mail.from=noreply@test.healthcare-hms.local

hms.security.cors.allowed-origins=http://localhost:3000
hms.security.cors.allow-credentials=true
hms.security.cors.max-age-seconds=3600
